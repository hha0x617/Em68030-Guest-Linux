name: Build Kernel and Modules

on:
  push:
    tags: ['v*']
  # Triggered on every PR so the required `build` status check is always
  # reported.  Docs-only PRs would otherwise deadlock against branch
  # protection: the workflow never ran, so the required check was never
  # satisfied.  The job now decides internally whether to run the heavy
  # m68k cross-build (see the "Detect relevant changes" step below) and
  # exits successfully without it for docs-only PRs.
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Linux kernel version. The major component selects both the kernel.org URL (vN.x/) and patches/linux-N/. Examples: 6.12.17, 7.0.6.'
        required: false
        default: '6.12.17'

env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.12.17' }}
  CONFIG_NAME: "fbconsole+evdev"
  CONFIG_FILE: "configs/.config.20260314_FB_CONSOLE_with_INPUT_EVDEV"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history to diff the PR against its base in
          # "Detect relevant changes".  Cheap on this small repo.
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        run: |
          # Non-PR events (tag push, manual dispatch) always run the full
          # build — they're how Releases get produced, and they're how a
          # contributor triggers a manual smoke build.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Non-PR event (${{ github.event_name }}) — running full build."
            exit 0
          fi
          # PR event: diff the merge base against HEAD and decide whether
          # any of the build-affecting paths were touched.  This keeps the
          # same set of paths the old `pull_request.paths:` filter listed.
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "Files changed in this PR:"
          echo "$CHANGED" | sed 's/^/  /'
          if echo "$CHANGED" | grep -qE '^(configs/|drivers/|patches/|docker/|build\.sh$|build\.ps1$|\.github/workflows/build\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Build-relevant files changed — running full build."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No build-relevant files changed (docs-only PR); reporting success without running the m68k cross-build."
          fi

      - name: Derive KERNEL_MAJOR
        if: steps.filter.outputs.relevant == 'true'
        id: kver
        run: |
          MAJOR="${KERNEL_VERSION%%.*}"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "KERNEL_MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "Using Linux ${KERNEL_VERSION} (major v${MAJOR}.x)"

      - name: Install m68k cross-compiler
        if: steps.filter.outputs.relevant == 'true'
        run: sudo apt-get update && sudo apt-get install -y gcc-m68k-linux-gnu binutils-m68k-linux-gnu make bc flex bison libelf-dev libssl-dev

      - name: Cache kernel source
        if: steps.filter.outputs.relevant == 'true'
        id: cache-kernel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/linux-${{ env.KERNEL_VERSION }}
          key: kernel-src-${{ env.KERNEL_VERSION }}

      - name: Download kernel source
        if: steps.filter.outputs.relevant == 'true' && steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          cd ~
          # `--fail` makes curl exit non-zero on HTTP errors so we surface
          # network problems at the curl call site rather than later when
          # `sha256sum -c` sees an HTML error page in expected.sha256.
          # `--retry 5 --retry-delay 10 --retry-all-errors` rides through
          # transient CDN flakes (5xx, partial files, connection resets).
          # Same pattern as Em68030-Guest-NetBSD's build.yml.
          CURL_OPTS="--retry 5 --retry-delay 10 --retry-all-errors --fail"
          BASE_URL="https://cdn.kernel.org/pub/linux/kernel/v${KERNEL_MAJOR}.x"
          curl -sLO $CURL_OPTS "${BASE_URL}/linux-${KERNEL_VERSION}.tar.xz"
          curl -sL $CURL_OPTS "${BASE_URL}/sha256sums.asc" | grep "linux-${KERNEL_VERSION}.tar.xz" > expected.sha256
          sha256sum -c expected.sha256
          tar xJf linux-${KERNEL_VERSION}.tar.xz
          rm linux-${KERNEL_VERSION}.tar.xz expected.sha256

      - name: Apply patches
        if: steps.filter.outputs.relevant == 'true'
        run: |
          cd ~/linux-${{ env.KERNEL_VERSION }}
          git init -q 2>/dev/null || true
          git add -A 2>/dev/null && git commit -q -m "baseline" --allow-empty 2>/dev/null || true
          git checkout -q -- . 2>/dev/null || true
          PATCH_DIR="$GITHUB_WORKSPACE/patches/linux-${KERNEL_MAJOR}"
          if [ -d "$PATCH_DIR" ]; then
            for patch in "$PATCH_DIR"/*.patch; do
              [ -e "$patch" ] || continue
              echo "Applying $(basename "$patch")..."
              patch -p1 -N < "$patch" || true
            done
          else
            echo "No patches for linux-${KERNEL_MAJOR}"
          fi

      - name: Build kernel
        if: steps.filter.outputs.relevant == 'true'
        run: |
          cd ~/linux-${{ env.KERNEL_VERSION }}
          cp $GITHUB_WORKSPACE/${{ env.CONFIG_FILE }} .config
          make ARCH=m68k CROSS_COMPILE=m68k-linux-gnu- olddefconfig
          make ARCH=m68k CROSS_COMPILE=m68k-linux-gnu- vmlinux -j$(nproc)
          make ARCH=m68k CROSS_COMPILE=m68k-linux-gnu- modules_prepare
          cp vmlinux.symvers Module.symvers

      - name: Build em68030fb module
        if: steps.filter.outputs.relevant == 'true'
        run: |
          make ARCH=m68k CROSS_COMPILE=m68k-linux-gnu- \
            -C ~/linux-${{ env.KERNEL_VERSION }} \
            M=$GITHUB_WORKSPACE/drivers/em68030fb modules

      - name: Build em68030input module
        if: steps.filter.outputs.relevant == 'true'
        run: |
          make ARCH=m68k CROSS_COMPILE=m68k-linux-gnu- \
            -C ~/linux-${{ env.KERNEL_VERSION }} \
            M=$GITHUB_WORKSPACE/drivers/em68030input modules

      - name: Verify build outputs
        if: steps.filter.outputs.relevant == 'true'
        run: |
          file ~/linux-${{ env.KERNEL_VERSION }}/vmlinux
          file drivers/em68030fb/em68030fb.ko
          file drivers/em68030input/em68030input.ko

      - name: Prepare artifacts
        if: steps.filter.outputs.relevant == 'true'
        run: |
          mkdir -p artifacts
          SHORT_HASH=$(git rev-parse --short HEAD)
          SUFFIX="${{ env.KERNEL_VERSION }}-mvme147-uart16550-${{ env.CONFIG_NAME }}-${SHORT_HASH}"
          cp ~/linux-${{ env.KERNEL_VERSION }}/vmlinux "artifacts/vmlinux-${SUFFIX}"
          cp drivers/em68030fb/em68030fb.ko "artifacts/em68030fb-${SHORT_HASH}.ko"
          cp drivers/em68030input/em68030input.ko "artifacts/em68030input-${SHORT_HASH}.ko"

      # ISO / virus scan / artifact upload run for both tag pushes (so the
      # release assets are built) and manual workflow_dispatch (so a
      # contributor can grab the kernel + modules for an emulator smoke
      # test).  PR-triggered runs stay lean — no upload, no clamav.
      - name: Create modules ISO
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get install -y genisoimage
          SHORT_HASH=$(git rev-parse --short HEAD)
          mkdir -p iso-staging
          cp drivers/em68030fb/em68030fb.ko iso-staging/
          cp drivers/em68030input/em68030input.ko iso-staging/
          genisoimage -o "artifacts/modules-${SHORT_HASH}.iso" -R -J iso-staging/
          echo "ISO created: $(du -h "artifacts/modules-${SHORT_HASH}.iso" | cut -f1)"

      - name: Virus scan artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get update && sudo apt-get install -y clamav
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo freshclam
          echo "Scanning artifacts..."
          clamscan --infected --recursive artifacts/
          if [ $? -eq 1 ]; then
            echo "::error::Virus detected in artifacts"
            exit 1
          fi
          echo "Scan passed: no threats detected."

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: em68030-guest-linux
          path: artifacts/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          TAG="${{ github.ref_name }}"
          SUFFIX="${{ env.KERNEL_VERSION }}-mvme147-uart16550-${{ env.CONFIG_NAME }}-${SHORT_HASH}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" artifacts/* --title "$TAG" --notes "$(cat <<EOF
          ## Em68030 Guest Linux ${TAG}

          Pre-built Linux ${{ env.KERNEL_VERSION }} kernel and modules for the Em68030 emulator.

          ### Assets
          - **vmlinux-${SUFFIX}** — Kernel image (load via File → Open ELF)
          - **em68030fb-${SHORT_HASH}.ko** — Framebuffer driver module
          - **em68030input-${SHORT_HASH}.ko** — Virtual keyboard/mouse driver module
          - **modules-${SHORT_HASH}.iso** — ISO image containing both modules (mount as SCSI CD-ROM)

          ### Installing modules
          **Option A: ISO image (recommended)**
          Load \`modules-${SHORT_HASH}.iso\` as SCSI CD-ROM in emulator settings, then:
          \`\`\`bash
          mount /dev/sr0 /mnt
          cp /mnt/*.ko /lib/modules/\$(uname -r)/extra/
          depmod -a
          umount /mnt
          \`\`\`

          **Option B: Individual .ko files**
          Download and rename \`.ko\` files before installing on the guest:
          \`\`\`bash
          mv em68030fb-*.ko em68030fb.ko
          mv em68030input-*.ko em68030input.ko
          \`\`\`

          ### Security
          - Virus scan: **Passed** (ClamAV, signatures updated at build time)

          ### Source Code (GPL-2.0)
          The kernel image is built from Linux ${{ env.KERNEL_VERSION }} with patches and configuration from this repository:
          - **Kernel source**: https://cdn.kernel.org/pub/linux/kernel/v${{ env.KERNEL_MAJOR }}.x/linux-${{ env.KERNEL_VERSION }}.tar.xz
          - **Patches**: [patches/linux-${{ env.KERNEL_MAJOR }}/](https://github.com/${{ github.repository }}/tree/${TAG}/patches/linux-${{ env.KERNEL_MAJOR }})
          - **Config**: [${{ env.CONFIG_FILE }}](https://github.com/${{ github.repository }}/blob/${TAG}/${{ env.CONFIG_FILE }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)
          EOF
          )"
