name: Bug report
description: Report a bug in this repo's kernel modules, patches, or build scripts
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug.  Reproducibility is the single most
        important detail — minimal kernel logs, build logs, or a
        small reproducer help enormously.

        **Bugs in the upstream Linux kernel itself (not introduced
        by this repo) should be filed with the kernel project, not
        here.  Bugs in the em68030 emulator host belong on the
        Em68030_CsWPF or Em68030_WinUI3Cpp repository.**

  - type: input
    id: version
    attributes:
      label: Repo commit hash or release tag
      placeholder: v0.1.0 or 1c2863a
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did you hit the bug?
      options:
        - Kernel module (em68030fb / em68030input)
        - Kernel patch (mvme147-uart-16550)
        - Build script (build.sh / build.ps1 / Docker)
        - Released binary artifact
        - Other
    validations:
      required: true

  - type: input
    id: emulator
    attributes:
      label: Emulator host + version
      placeholder: Em68030_CsWPF v0.1.0 on Windows 11
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (kernel dmesg, build output, etc.)
      render: shell
